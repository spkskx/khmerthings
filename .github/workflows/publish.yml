name: Publish

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  checks:
    name: Full checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install
        run: uv sync --locked
      - name: Ruff lint
        run: uv run ruff check --output-format=github
      - name: Ruff format
        run: uv run ruff format --check
      - name: Mypy
        run: uv run mypy src tests
      - name: Run tests
        run: uv run pytest

  publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    needs: checks
    environment: pypi
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Check tag matches package version
        run: |
          version=$(uv run --no-sync python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          tag="${GITHUB_REF_NAME#v}"
          if [ "$version" != "$tag" ]; then
            echo "Tag v$tag does not match pyproject.toml version $version" >&2
            exit 1
          fi
      - name: Build sdist and wheel
        run: uv build
      - name: Smoke test the wheel
        run: |
          uv venv /tmp/smoke
          uv pip install --python /tmp/smoke/bin/python dist/*.whl
          echo "ខ្ញុំស្រឡាញ់ភាសាខ្មែរ" | /tmp/smoke/bin/python -m khmerthings count -
      - name: Publish to PyPI
        run: uv publish --token "$PYPI_API_TOKEN"
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
